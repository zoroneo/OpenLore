name: 'OpenLore structural review'
description: >
  Post a deterministic structural PR briefing (structural delta + blast radius) as ONE sticky comment.
  Advisory by default — informs, never fails the check (unless you opt into blastRadius.block).
author: 'OpenLore'

inputs:
  github-token:
    description: 'Token used to create/update the sticky PR comment.'
    required: false
    default: ${{ github.token }}
  base:
    description: 'Base git ref to compare against.'
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  head:
    description: 'Head git ref (the PR head). Defaults to the checked-out commit.'
    required: false
    default: ${{ github.event.pull_request.head.sha }}
  analyze:
    description: 'Run `openlore analyze` before the review so the blast radius is fully populated.'
    required: false
    default: 'true'
  openlore-version:
    description: 'npm version/tag of openlore to run (e.g. "latest", "2.1.4").'
    required: false
    default: 'latest'
  gate:
    description: 'Pass `--hook` so a configured blastRadius.block pattern fails the job (opt-in gating).'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build the OpenLore index (optional, for full blast radius)
      if: ${{ inputs.analyze == 'true' }}
      shell: bash
      run: npx --yes openlore@${{ inputs.openlore-version }} analyze --no-embed || echo "analyze failed — review will show the structural delta only"

    - name: Run openlore review
      id: review
      shell: bash
      run: |
        OUT="$RUNNER_TEMP/openlore-review.md"
        ARGS=(review --base "${{ inputs.base }}" --head "${{ inputs.head }}" --format markdown --out "$OUT")
        if [ "${{ inputs.gate }}" = "true" ]; then ARGS+=(--hook); fi
        set +e
        npx --yes openlore@${{ inputs.openlore-version }} "${ARGS[@]}"
        RC=$?
        set -e
        # Distinguish a REAL gate (review ran and a blastRadius.block pattern fired:
        # the briefing file was written AND exit was non-zero) from review being unable
        # to run at all (a published openlore without `review`, an unreachable range, a
        # crash → no briefing file). Only the former fails the job; the latter is advisory.
        if [ "${{ inputs.gate }}" = "true" ] && [ "$RC" -ne 0 ] && [ -s "$OUT" ]; then
          echo "openlore review: a configured blastRadius.block pattern fired — failing the job (gate mode)."
          exit "$RC"
        fi
        if [ ! -s "$OUT" ]; then
          echo "openlore review produced no briefing — the published 'openlore' (openlore-version: ${{ inputs.openlore-version }}) may not yet ship the 'review' command, or the base..head range was unreachable. Skipping the comment (advisory)."
        fi

    - name: Post or update the sticky review comment
      if: ${{ github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const path = `${process.env.RUNNER_TEMP}/openlore-review.md`;
          if (!fs.existsSync(path)) { core.info('No review output to post.'); return; }
          let body = fs.readFileSync(path, 'utf8');
          if (!body.trim()) { core.info('Review output was empty; skipping comment.'); return; }
          // GitHub rejects a comment body over 65536 chars (422). `openlore review` already
          // clamps, but guard here too so a future change can never 422 the post step.
          const MAX = 65536;
          if (body.length > MAX) {
            const notice = '\n\n<sub>⚠ Briefing truncated to fit GitHub\'s comment size limit.</sub>\n';
            body = body.slice(0, MAX - notice.length) + notice;
          }
          const marker = '<!-- openlore-review -->';
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          if (!issue_number) { core.info('Not a PR context; skipping comment.'); return; }
          // Advisory contract: a comment-post failure (a fork PR's read-only GITHUB_TOKEN,
          // a missing `pull-requests: write` permission, a transient API error) must NEVER
          // fail the check. Warn and move on — the briefing is in the job log either way.
          try {
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const matches = comments.filter(c => typeof c.body === 'string' && c.body.includes(marker));
            const existing = matches[0];
            // Self-heal: if more than one sticky comment ever exists (a prior race / human
            // copy), keep the first and remove the rest so the PR carries exactly one.
            for (const dup of matches.slice(1)) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: dup.id }).catch(() => {});
            }
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated sticky review comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              core.info('Created sticky review comment');
            }
          } catch (e) {
            core.warning(`OpenLore: could not post the review comment (${e.status ?? ''} ${e.message}). ` +
              `On pull requests from a fork, GITHUB_TOKEN is read-only and cannot comment; ` +
              `the briefing is available in this job's log.`);
          }
